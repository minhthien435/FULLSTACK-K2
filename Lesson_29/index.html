         *{
            padding:0;
            margin:0;
         }
        ul {
              list-style: none;
         }
         .menu ul li{
            list-style-type: none;
         }
         .menu{
          
            width:150px;
            background:#000;
            margin: 30px auto;
         }
         .menu a{

            color:#fff;
            text-decoration: none;
            display:block;
            padding:5px 15px;
         }
         .menu ul {
            background-color: green;
            display:none;
         }
         .menu li.has-children >a::after{
            content:"▼";
            float:right;
            font-size:0.7rem;
            margin-top:5px;
            padding-top:5px;

         }
         .menu li.active > ul{
            display:block;
         }
         .menu li.has-children.active >a::after{
            rotate:180deg;
            transition: all 0.3s ease;
         }
    </style>
</head>
<body>

    <a class="link" href="https://fullstack.edu.vn">F8</a>
