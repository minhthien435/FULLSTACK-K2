<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF Tool</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">HTML to PDF Converter</h2>
        
        <div id="pdf-content" class="mb-4">
            <textarea id="inputText" 
                      class="w-full h-40 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Nhập nội dung vào đây..."></textarea>
        </div>

        <button onclick="generatePDF()" 
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200">
            Xuất file PDF
        </button>
    </div>

    <script>
        function generatePDF() {
            // Lấy phần tử chứa nội dung muốn xuất
            const element = document.getElementById('pdf-content');
            
            // Cấu hình xuất PDF
            const opt = {
                margin:       10,
                filename:     'my-document.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Thực hiện chuyển đổi
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
