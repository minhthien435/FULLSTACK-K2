        // sắp xếp nổi bọt bubble sort
        let arr = [4,1,3,5,8,2];
        arr.sort(function(q,w){
            if(w>q){
                return -1;
                // q đứng trước w (đúng theo thứ tự tăng dần)
            }else if(w<q){
                return 1; // q đứng sau w (cần đổi chỗ)
            }else{
                return 0;
            }
        });
