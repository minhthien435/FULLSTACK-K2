      var mang = [1,2,3,4,5,6,7,8,9];
      var size=2;
      // chunk array với size tương ứng
      // Output: [[1,2],[3,4],[5,6],[7,8],[9]]
      // ý tưởng:
      var chunkArray=mang.reduce(function(prev,current){
        // kiểm tra số lượng phàn tử của mảng con cuối cùng 
        if(prev[prev.length-1].length < size){
        // thêm phần tử mới vào mảng con
            prev[prev.length-1].push(current);
        }else{
        // ngược lại thêm 1 mảng mới (thêm một đoạn mới)
             prev.push([current]);
        }
        return prev;
      },

    );
